# GitHub Actions：构建后端 + 前端(admin)镜像并推送到 GHCR
#
# 触发：推送到 main 分支，或在 Actions 页面手动运行(workflow_dispatch)
# 产物：两个镜像推送到 GitHub Container Registry (ghcr.io)
#   - 后端:  ghcr.io/<owner>/<repo>-backend
#   - 前端:  ghcr.io/<owner>/<repo>-frontend
#
# 服务器侧：在 server/docker/.env 里配置(镜像名全小写)：
#   BACKEND_IMAGE=ghcr.io/<owner>/<repo>-backend:latest
#   FRONTEND_IMAGE=ghcr.io/<owner>/<repo>-frontend:latest
# 然后 docker compose pull && docker compose up -d 即可拉取本流程构建的镜像。
#
# 无需额外密钥：使用 GitHub 内置的 GITHUB_TOKEN 推送到 GHCR。

name: Build and Push Images

on:
  push:
    branches: [main]
    # 仅当这些路径变化时才触发，避免改文档也重复构建
    paths:
      - "server/**"
      - "admin/**"
      - "website/**"
      - ".github/workflows/build-and-push.yml"
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 推送镜像到 GHCR 需要
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./server
            dockerfile: ./server/Dockerfile
          - name: frontend
            context: ./admin
            dockerfile: ./admin/Dockerfile
          - name: website
            context: ./website
            dockerfile: ./website/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 计算全小写的镜像名(GHCR 要求小写)
      - name: Compute image name
        id: img
        run: echo "image=${REGISTRY}/${GITHUB_REPOSITORY,,}-${{ matrix.name }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# GitHub Actions：构建后端 + 前端(admin)镜像并推送到 GHCR
#
# 触发：推送到 main 分支，或在 Actions 页面手动运行(workflow_dispatch)
# 产物：两个镜像推送到 GitHub Container Registry (ghcr.io)
#   - 后端:  ghcr.io/<owner>/<repo>-backend
#   - 前端:  ghcr.io/<owner>/<repo>-frontend
#
# 服务器侧：在 server/docker/.env 里配置(镜像名全小写)：
#   BACKEND_IMAGE=ghcr.io/<owner>/<repo>-backend:latest
#   FRONTEND_IMAGE=ghcr.io/<owner>/<repo>-frontend:latest
#   WEBSITE_IMAGE=ghcr.io/<owner>/<repo>-website:latest
#
# 自动部署(deploy 作业)：镜像构建成功后，自动 SSH 到服务器执行 update.sh
# (git pull 同步部署文件 → docker compose pull && up -d → 健康检查)。
# 需在仓库 Settings → Secrets and variables → Actions 配置以下 Secret：
#   DEPLOY_SSH_HOST      服务器公网 IP 或域名
#   DEPLOY_SSH_USER      SSH 登录用户名(如 root)
#   DEPLOY_SSH_PASSWORD  SSH 登录密码
#   DEPLOY_SSH_PORT      SSH 端口(可选，缺省 22)
#   DEPLOY_DIR           服务器上 update.sh 所在目录(克隆仓库里的 server/docker)
# 前提：服务器已一次性 `docker login ghcr.io`(update.sh 里的 compose pull 需要)。
#
# 推送镜像到 GHCR 使用 GitHub 内置的 GITHUB_TOKEN，无需额外密钥。

name: Build and Push Images

on:
  push:
    branches: [main]
    # 仅当这些路径变化时才触发，避免改文档也重复构建
    paths:
      - "server/**"
      - "admin/**"
      - "website/**"
      - ".github/workflows/build-and-push.yml"
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 推送镜像到 GHCR 需要
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./server
            dockerfile: ./server/Dockerfile
          - name: frontend
            context: ./admin
            dockerfile: ./admin/Dockerfile
          - name: website
            context: ./website
            dockerfile: ./website/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 计算全小写的镜像名(GHCR 要求小写)
      - name: Compute image name
        id: img
        run: echo "image=${REGISTRY}/${GITHUB_REPOSITORY,,}-${{ matrix.name }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== 自动部署到服务器 ====================
  # 三个镜像都构建成功后，SSH 到服务器拉取最新镜像并重启容器。
  # 仅在 push 到 main(默认分支)时部署；手动 workflow_dispatch 也会部署。
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          command_timeout: 12m
          script: |
            set -eu
            cd "${{ secrets.DEPLOY_DIR }}"
            # 若部署目录在克隆的仓库内，先同步最新的部署文件(compose/update.sh/nginx 等)。
            # 不在 git 仓库或无远端时跳过，不影响后续拉镜像。
            if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
              echo "==> 同步部署文件 (git pull)..."
              git fetch --all --prune
              git checkout main
              git reset --hard origin/main
            else
              echo "==> 非 git 仓库目录，跳过文件同步，直接拉镜像。"
            fi
            chmod +x ./update.sh
            ./update.sh
